```html
<footer>

Made for ❤️ Sadmanul

</footer>

<script>

const tripDate = new Date("2026-06-28T21:00:00");

const checkboxes = document.querySelectorAll('input[type="checkbox"]');
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const countdown = document.getElementById("countdown");
const emoji = document.getElementById("emoji");
const darkBtn = document.getElementById("darkBtn");

checkboxes.forEach((box,index)=>{

const saved = localStorage.getItem("item"+index);

if(saved==="true"){
box.checked=true;
}

box.addEventListener("change",()=>{

localStorage.setItem("item"+index,box.checked);

updateProgress();

});

});

function updateProgress(){

let checked=0;

checkboxes.forEach(box=>{

if(box.checked) checked++;

});

const percent=Math.round((checked/checkboxes.length)*100);

progressFill.style.width=percent+"%";

progressText.textContent=percent+"% Packed";

if(percent<25){

emoji.textContent="😎";

}else if(percent<50){

emoji.textContent="🎒";

}else if(percent<75){

emoji.textContent="🚗";

}else if(percent<100){

emoji.textContent="🏔️";

}else{

emoji.textContent="🎉";

setTimeout(()=>{

alert("🎉 You're fully packed!\n\nHave an amazing Lake District trip!");

},300);

}

}

function updateCountdown(){

const now=new Date();

const diff=tripDate-now;

if(diff<=0){

countdown.textContent="🚗 Trip Time!";

return;

}

const days=Math.floor(diff/(1000*60*60*24));

const hours=Math.floor((diff/(1000*60*60))%24);

countdown.textContent="⏳ "+days+" Days "+hours+" Hours Left";

}

if(localStorage.getItem("darkMode")==="true"){

document.body.classList.add("dark");

}

darkBtn.onclick=()=>{

document.body.classList.toggle("dark");

localStorage.setItem(

"darkMode",

document.body.classList.contains("dark")

);

};

updateProgress();

updateCountdown();

setInterval(updateCountdown,60000);

</script>

</body>

</html>
